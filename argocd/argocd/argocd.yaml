---
# ArgoCD Application - ArgoCD Bootstrap with SSO
# Sync Wave: 3 (after Keycloak and Keycloak clients are ready)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-bootstrap
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 7.7.14
    helm:
      releaseName: argocd-bootstrap
      values: |
        global:
          domain: argocd-bootstrap.hnatekmar.xyz
          image:
            repository: quay.io/argoproj/argocd
            tag: v2.12.3
            imagePullPolicy: IfNotPresent
          additionalLabels:
            app.kubernetes.io/part-of: argocd
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999

        # ArgoCD ConfigMap
        configs:
          cm:
            create: true
            url: https://argocd-bootstrap.hnatekmar.xyz
            admin.enabled: "false"
            timeout.reconciliation: 180s
            application.instanceLabelKey: argocd.argoproj.io/instance

            # OIDC Configuration with Keycloak (PKCE for CLI support)
            # Client secret referenced from Crossplane-managed secret
            oidc.config: |
              name: Keycloak
              issuer: https://sso.hnatekmar.xyz/realms/master
              clientID: argocd-bootstrap
              enablePKCEAuthentication: true
              refreshTokenThreshold: 2m
              clientSecret: $argocd-bootstrap-oidc-creds:clientSecret
              requestedScopes: ["openid", "profile", "email", "groups"]
              requestedIDTokenClaims:
                groups:
                  essential: true

            # RBAC Policy - Default to read-only for authenticated users
            policy.default: role:readonly
            policy.csv: |
              g, ArgoCDAdmins, role:admin
              g, Developers, role:developer
              g, Operators, role:operator

          params:
            # Ingress handles SSL, ArgoCD runs HTTP internally
            server.insecure: true

          secret:
            create: true

          rbac:
            create: true
            policy.default: role:readonly
            policy.csv: |
              g, ArgoCDAdmins, role:admin
              g, Developers, role:developer
              g, Operators, role:operator

        # Server configuration
        server:
          # Ingress configuration using cert-manager (like other services)
          ingress:
            enabled: true
            ingressClassName: kong
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              # Ingress handles SSL, backend uses HTTP
              konghq.com/strip-path: "false"
            tls: true
            hostname: argocd-bootstrap.hnatekmar.xyz

          service:
            type: ClusterIP

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          # Disable built-in certificate (using cert-manager via ingress)
          certificate:
            enabled: false

          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
            - key: node-role.kubernetes.io/master
              operator: Exists
              effect: NoSchedule

        # Controller
        controller:
          replicas: 1
          resources:
            requests:
              cpu: 250m
              memory: 756Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
            - key: node-role.kubernetes.io/master
              operator: Exists
              effect: NoSchedule

        # Repository servers
        repoServer:
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
            - key: node-role.kubernetes.io/master
              operator: Exists
              effect: NoSchedule

        # ApplicationSet
        applicationSet:
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
            - key: node-role.kubernetes.io/master
              operator: Exists
              effect: NoSchedule

        # Redis (single instance, not HA)
        redis:
          enabled: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
            - key: node-role.kubernetes.io/master
              operator: Exists
              effect: NoSchedule

        # HA disabled for single-node setup
        redis-ha:
          enabled: false

        # CRDs
        crds:
          install: true
          keep: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
