---
# ExternalSecret for ArgoCD Bootstrap OIDC Client
# Syncs the Keycloak client secret from OpenBao to the ArgoCD namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-bootstrap-oidc-secret
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: local
    kind: ClusterSecretStore
  target:
    name: argocd-bootstrap-oidc-secret
    creationPolicy: Owner
  data:
    - secretKey: clientSecret
      remoteRef:
        key: argocd-bootstrap-hnatekmar-xyz
        property: client_secret
