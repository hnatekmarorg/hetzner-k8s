---
# ExternalSecret for ArgoCD OIDC Client
# Syncs the Keycloak client secret from OpenBao to the ArgoCD namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-oidc-secret
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: local
    kind: ClusterSecretStore
  target:
    name: argocd-oidc-secret
    creationPolicy: Owner
  data:
    - secretKey: clientSecret
      remoteRef:
        key: argocd-hnatekmar-xyz
        property: client_secret
---
# ExternalSecret for ArgoCD OIDC Client in crossplane-system namespace
# Syncs the Keycloak client secret from OpenBao to crossplane-system
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-oidc-secret
  namespace: crossplane-system
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: local
    kind: ClusterSecretStore
  target:
    name: argocd-oidc-secret
    creationPolicy: Owner
  data:
    - secretKey: clientSecret
      remoteRef:
        key: argocd-hnatekmar-xyz
        property: client_secret
