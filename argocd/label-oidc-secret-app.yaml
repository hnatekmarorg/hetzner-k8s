---
# ArgoCD Application for OIDC secret labeler
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: label-oidc-secret
  namespace: argocd
  labels:
    app.kubernetes.io/name: label-oidc-secret
    app.kubernetes.io/part-of: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-repo/hetzner-k8s.git
    targetRevision: HEAD
    path: argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
