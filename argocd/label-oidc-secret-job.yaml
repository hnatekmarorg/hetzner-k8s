---
# ServiceAccount for labeling OIDC secret
apiVersion: v1
kind: ServiceAccount
metadata:
  name: oidc-secret-labeler
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
# Role to label secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: oidc-secret-labeler
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  rules:
    - apiGroups: [""]
      resources: ["secrets"]
      verbs: ["get", "label", "patch", "update"]
---
# RoleBinding for the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: oidc-secret-labeler
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
subjects:
  - kind: ServiceAccount
    name: oidc-secret-labeler
    namespace: argocd
roleRef:
  kind: Role
  name: oidc-secret-labeler
  apiGroup: rbac.authorization.k8s.io
---
# Job to label the OIDC secret
apiVersion: batch/v1
kind: Job
metadata:
  name: label-oidc-secret
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      serviceAccountName: oidc-secret-labeler
      restartPolicy: Never
      containers:
        - name: label-secret
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Labeling OIDC secret for ArgoCD..."
              kubectl label secret argocd-bootstrap-hnatekmar-xyz -n argocd app.kubernetes.io/part-of=argocd --overwrite
              echo "Secret labeled successfully!"
  backoffLimit: 3
