apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloakx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - repoURL: https://codecentric.github.io/helm-charts
      chart: keycloakx
      targetRevision: 7.1.5
      helm:
        releaseName: keycloakx
        valueFiles:
          - $values/argocd/keycloak-values.yaml
    - repoURL: https://github.com/hnatekmarorg/hetzner-k8s.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/hnatekmarorg/hetzner-k8s.git
      targetRevision: main
      path: crossplane/secrets
      ref: secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
