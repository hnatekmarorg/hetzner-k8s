---
# ServiceAccount for labeling OIDC secret
apiVersion: v1
kind: ServiceAccount
metadata:
  name: oidc-secret-labeler
  namespace: argocd
  labels:
    app.kubernetes.io/name: oidc-secret-labeler
    app.kubernetes.io/part-of: argocd
---
# Role to label secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: oidc-secret-labeler
  namespace: argocd
  labels:
    app.kubernetes.io/name: oidc-secret-labeler
    app.kubernetes.io/part-of: argocd
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "label", "patch", "update"]
---
# RoleBinding for the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: oidc-secret-labeler
  namespace: argocd
  labels:
    app.kubernetes.io/name: oidc-secret-labeler
    app.kubernetes.io/part-of: argocd
subjects:
  - kind: ServiceAccount
    name: oidc-secret-labeler
    namespace: argocd
roleRef:
  kind: Role
  name: oidc-secret-labeler
  apiGroup: rbac.authorization.k8s.io
---
# Deployment to continuously ensure OIDC secret is labeled
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oidc-secret-labeler
  namespace: argocd
  labels:
    app.kubernetes.io/name: oidc-secret-labeler
    app.kubernetes.io/part-of: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oidc-secret-labeler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oidc-secret-labeler
    spec:
      serviceAccountName: oidc-secret-labeler
      restartPolicy: Always
      containers:
        - name: label-secret
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Starting OIDC secret labeler..."
              while true; do
                echo "Labeling OIDC secret for ArgoCD..."
                kubectl label secret argocd-bootstrap-hnatekmar-xyz -n argocd app.kubernetes.io/part-of=argocd --overwrite
                if [ $? -eq 0 ]; then
                  echo "Secret labeled successfully!"
                else
                  echo "Failed to label secret, will retry..."
                fi
                echo "Sleeping for 60 seconds..."
                sleep 60
              done
          resources:
            limits:
              cpu: 50m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
