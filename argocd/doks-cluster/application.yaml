---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: doks-cluster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/hnatekmarorg/hetzner-k8s.git
    targetRevision: HEAD
    path: charts/doks-cluster
    helm:
      releaseName: doks-cluster
      valueFiles:
        - $values/charts/doks-cluster/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: doks-cluster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /status
