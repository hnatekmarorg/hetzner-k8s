# Default values for openbao.
# This is a YAML file that lists values that can be configured.
# For full list of available values, see the chart's README.

replicaCount: 1

# Additional configuration can be added here...

ui:
  enabled: true

server:
  affinity: ""
  ingress:
    ingressClassName: "kong"
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    tls:
      - secretName: bao-secret
        hosts:
          - bao.hnatekmar.xyz
    hosts:
      - host: bao.hnatekmar.xyz
  image:
    repository: openbao/openbao
    tag: "latest"
    pullPolicy: IfNotPresent
  dataStorage:
    storageClass: "local-path"
  auditStorage:
    storageClass: "local-path"
  # MIGRATION: Override default standalone config to use Raft storage
  # This fixes inode exhaustion by using a single raft.db file instead of 2M+ small files
  standalone:
    config: |
      ui = true

      listener "tcp" {
        tls_disable = 1
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }

      # Raft integrated storage - production-ready, low inode usage
      storage "raft" {
        path = "/openbao/data"
        node_id = "openbao-0"

        # Raft tuning for inode-constrained environment
        # Higher thresholds = fewer snapshots, less file operations
        snapshot_threshold = 16384     # Default 8192 - doubled to reduce snapshots
        snapshot_interval = 240       # Default 120s - check every 4 minutes
        trailing_logs = 20000         # Default 10000 - more logs = fewer snapshots
      }

      # Token TTL limits to reduce token file proliferation
      default_lease_ttl = "1h"
      max_lease_ttl = "24h"

      # Token cleanup configuration
      token {
        # Allow token renewal but with limits
        allowed_response_wrapping_ttl = "5m"
        # Default TTL for tokens without explicit TTL
        default_ttl = "1h"
        # Maximum TTL for any token
        max_ttl = "24h"
      }


# Agent Injector configuration
agentInject:
  enabled: true
  replicaCount: 1
  # Disable pod anti-affinity for single-node deployment
  affinity: null
  # Resource limits
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
