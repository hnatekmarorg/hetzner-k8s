---
# ArgoCD Application
# Deploys ArgoCD with Keycloak SSO integration via Helm chart
# Accessible via https://argocd.hnatekmar.xyz/argocd
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 9.4.17
    helm:
      valuesObject:
        fullnameOverride: argocd
        global:
          domain: argocd.hnatekmar.xyz
        configs:
          params:
            "server.insecure": "true"
          rbac:
            create: true
            policy.csv: |
              g, argocd-admins, role:admin
          cm:
            admin.enabled: false
            url: https://argocd.hnatekmar.xyz/argocd
            oidc.config: |
              name: sso
              issuer: https://sso.hnatekmar.xyz/realms/master
              clientID: argocd-hnatekmar-xyz
              clientSecret: $argocd-oidc-secret:clientSecret
              requestedScopes:
                - openid
                - profile
                - microprofile-jwt
                - email
        server:
          ingress:
            enabled: true
            ingressClassName: kong
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              konghq.com/strip-path: "true"
            extraTls:
              - hosts:
                  - argocd.hnatekmar.xyz
                secretName: argocd-server-tls
          service:
            type: ClusterIP
          extraArgs:
            - --insecure
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - kind: ConfigMap
      name: argocd-cm
      jsonPointers:
        - /data/oidc.config
