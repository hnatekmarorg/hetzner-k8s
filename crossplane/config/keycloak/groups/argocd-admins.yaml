---
# Keycloak Group for ArgoCD Administrators
# Users added to this group will have admin access to ArgoCD
apiVersion: group.keycloak.crossplane.io/v1alpha1
kind: Group
metadata:
  name: argocd-admins
  namespace: crossplane-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  deletionPolicy: Delete
  providerConfigRef:
    name: sso-hnatekmar-xyz
  forProvider:
    name: argocd-admins
    realmId: master
