---
# Client Scope for groups claim in JWT
# This scope includes a protocol mapper that adds groups to tokens
apiVersion: clientscopes.openidclient.keycloak.crossplane.io/v1alpha1
kind: ClientScope
metadata:
  name: bao-hnatekmar-xyz-groups-scope
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  deletionPolicy: Delete
  providerConfigRef:
    name: sso-hnatekmar-xyz
  forProvider:
    name: bao-hnatekmar-xyz-groups
    realmId: master
    description: "Client scope to include groups in JWT tokens"
