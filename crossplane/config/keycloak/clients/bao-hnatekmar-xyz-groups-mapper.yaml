---
# Protocol Mapper attached to the groups client scope
# Adds groups claim to all JWT tokens
apiVersion: client.keycloak.crossplane.io/v1alpha1
kind: ProtocolMapper
metadata:
  name: bao-hnatekmar-xyz-groups-mapper
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  deletionPolicy: Delete
  providerConfigRef:
    name: sso-hnatekmar-xyz
  forProvider:
    clientScopeIdRef:
      name: bao-hnatekmar-xyz-groups-scope
    realmId: master
    name: groups
    protocol: openid-connect
    protocolMapper: oidc-group-membership-mapper
    config:
      claim.name: "groups"
      jsonType.label: "JSON"
      full.path: "false"
      access.token.claim: "true"
      id.token.claim: "true"
      userinfo.token.claim: "true"
