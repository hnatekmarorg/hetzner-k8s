---
# Keycloak Client Default Scopes for ArgoCD
# This configures which scopes are automatically included in OIDC tokens
apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: ClientDefaultScopes
metadata:
  name: argocd-bootstrap-scopes
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  providerConfigRef:
    name: sso-hnatekmar-xyz
  forProvider:
    realmId: master
    clientIdRef:
      name: argocd-bootstrap
    defaultScopes:
      # Standard OpenID Connect scopes
      - email
      - profile
      # Required for OpenBao integration
      - microprofile-jwt
      # Additional standard scopes
      - roles
      - web-origins
