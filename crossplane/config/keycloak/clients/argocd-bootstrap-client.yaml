---
# Keycloak OIDC Client for ArgoCD Bootstrap
# This client enables SSO authentication for the ArgoCD Bootstrap instance
apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: Client
metadata:
  name: argocd-bootstrap-hnatekmar-xyz
  namespace: crossplane-system
spec:
  deletionPolicy: Delete
  writeConnectionSecretToRef:
    name: argocd-bootstrap-hnatekmar-xyz
    namespace: argocd
  providerConfigRef:
    name: sso-hnatekmar-xyz
  forProvider:
    accessType: CONFIDENTIAL
    realmId: master
    standardFlowEnabled: true
    fullScopeAllowed: true
    directAccessGrantsEnabled: true
    serviceAccountsEnabled: true
    clientId: argocd-bootstrap-hnatekmar-xyz
    baseUrl: /applications
    rootUrl: https://argocd-bootstrap.hnatekmar.xyz
    validPostLogoutRedirectUris:
      - https://argocd-bootstrap.hnatekmar.xyz/applications
      - https://argocd-bootstrap.hnatekmar.xyz/auth/callback
    validRedirectUris:
      - http://localhost:8080/auth/callback
      - https://argocd-bootstrap.hnatekmar.xyz/auth/callback
---
apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: ClientDefaultScopes
metadata:
  name: argocd-bootstrap-hnatekmar-xyz-default-scopes
  namespace: crossplane-system
spec:
  providerConfigRef:
    name: sso-hnatekmar-xyz
  forProvider:
    realmId: master
    clientIdRef:
      name: argocd-bootstrap-hnatekmar-xyz
    defaultScopes:
      - acr
      - email
      - profile
      - roles
      - web-origins
      - microprofile-jwt
      - groups
---
apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: ClientOptionalScopes
metadata:
  name: argocd-bootstrap-hnatekmar-xyz-optional-scopes
  namespace: crossplane-system
spec:
  providerConfigRef:
    name: sso-hnatekmar-xyz
  forProvider:
    realmId: master
    clientIdRef:
      name: argocd-bootstrap-hnatekmar-xyz
    optionalScopes:
      - phone
      - address
      
