---
# Attach groups scope as a default scope to the bao-hnatekmar-xyz client
# This ensures groups are ALWAYS included in JWT tokens
apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: ClientDefaultScopes
metadata:
  name: bao-hnatekmar-xyz-groups-default
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  spec:
  deletionPolicy: Delete
  providerConfigRef:
    name: sso-hnatekmar-xyz
  forProvider:
    clientIdRef:
      name: bao-hnatekmar-xyz
    realmId: master
    defaultScopes:
      - bao-hnatekmar-xyz-groups
