---
# Attach default scopes to the bao-hnatekmar-xyz client
# This ensures email and groups are ALWAYS included in JWT tokens
apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: ClientDefaultScopes
metadata:
  name: bao-hnatekmar-xyz-default-scopes
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  deletionPolicy: Delete
  managementPolicies:
    - '*'
  providerConfigRef:
    name: sso-hnatekmar-xyz
  forProvider:
    clientIdRef:
      name: bao-hnatekmar-xyz
    realmId: master
    defaultScopes:
      # Standard OpenID Connect email scope - adds email claim to tokens
      - email
      # MicroProfile JWT scope - includes groups in token for JWT propagation
      - microprofile-jwt
      # Custom groups scope for OpenBao authentication
      - bao-hnatekmar-xyz-groups

