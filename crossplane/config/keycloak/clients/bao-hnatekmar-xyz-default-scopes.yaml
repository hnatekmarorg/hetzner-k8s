---
# Attach default scopes to the bao-hnatekmar-xyz client
# microprofile-jwt includes groups claim in JWT tokens
apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: ClientDefaultScopes
metadata:
  name: bao-hnatekmar-xyz-default-scopes
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  deletionPolicy: Delete
  providerConfigRef:
    name: sso-hnatekmar-xyz
  forProvider:
    clientIdRef:
      name: bao-hnatekmar-xyz
    realmId: master
    defaultScopes:
      - acr
      - email
      - profile
      - roles
      - web-origins
      - microprofile-jwt
