---
# Keycloak Client for ArgoCD SSO
# Uses PKCE authentication for CLI support
apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: Client
metadata:
  name: argocd-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  # Write the client secret to a Kubernetes secret for ArgoCD to use
  writeConnectionSecretToRef:
    namespace: crossplane-system
    name: argocd-bootstrap-oidc-creds
  providerConfigRef:
    name: sso-hnatekmar-xyz
  forProvider:
    # Client authentication disabled for PKCE
    accessType: PUBLIC
    clientId: argocd-bootstrap
    standardFlowEnabled: true
    directAccessGrantsEnabled: true
    enabled: true
    realmId: master

    # Redirect URIs for web and CLI
    # ArgoCD with PKCE uses /auth/callback
    webOrigins:
      - https://argocd-bootstrap.hnatekmar.xyz
      - +
    validRedirectUris:
      - https://argocd-bootstrap.hnatekmar.xyz/auth/callback
      - http://localhost:8085/auth/callback
      - http://localhost:*
