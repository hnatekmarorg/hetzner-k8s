---
# Realm role for hnatekmarorg admin users
# This role grants full access to SSH backend
apiVersion: role.keycloak.crossplane.io/v1alpha1
kind: Role
metadata:
  name: hnatekmarorg-admin-realm-role
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  deletionPolicy: Delete
  providerConfigRef:
    name: sso-hnatekmar-xyz
  forProvider:
    name: hnatekmarorg-admin
    realmId: master
    description: "Admin role for hnatekmarorg SSH backend management"
