---
# Realm role for hnatekmarorg users
# This role grants access to sign user SSH certificates
apiVersion: role.keycloak.crossplane.io/v1alpha1
kind: Role
metadata:
  name: hnatekmarorg-realm-role
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  deletionPolicy: Delete
  providerConfigRef:
    name: sso-hnatekmar-xyz
  forProvider:
    name: hnatekmarorg
    realmId: master
    description: "Role for hnatekmarorg users with SSH certificate access"
