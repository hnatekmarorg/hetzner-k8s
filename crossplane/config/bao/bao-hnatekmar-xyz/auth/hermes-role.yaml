# Auth role for hermes agent — machine identity via Kubernetes SA
apiVersion: kubernetes.vault.upbound.io/v1alpha1
kind: AuthBackendRole
metadata:
  name: hermes-agent
  namespace: crossplane-system
spec:
  forProvider:
    backendRef:
      name: bao-hnatekmar-xyz
    roleName: hermes-agent
    boundServiceAccountNames:
      - hermes
    boundServiceAccountNamespaces:
      - hermes
    tokenPolicies:
      - hermes-agent
    aliasNameSource: serviceaccount_name
    tokenTtl: 1800
    tokenMaxTtl: 3600
    tokenType: "service"
  providerConfigRef:
    name: bao-hnatekmar-xyz
