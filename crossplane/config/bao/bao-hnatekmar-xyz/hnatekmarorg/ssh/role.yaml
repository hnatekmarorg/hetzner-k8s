apiVersion: ssh.vault.upbound.io/v1alpha1
kind: SecretBackendRole
metadata:
  name: hnatekmarorg-ssh-ca-role
  namespace: crossplane-system
spec:
  deletionPolicy: Delete
  forProvider:
    name: "hnatekmarorg"
    backend: hnatekmarorg-ssh
    keyType: "ca"
    defaultUser: "root"
    cidrList: "0.0.0.0/0"
    allowedUsers: "*"
    ttl: "24h"
    maxTtl: "168h"  # 7 days max (allows 1-week renewal window)
    allowUserCertificates: true
    allowedExtensions: "permit-pty"
    defaultExtensions:
      "permit-pty": ""
      "permit-port-forwarding": ""
  providerConfigRef:
    name: bao-hnatekmar-xyz
