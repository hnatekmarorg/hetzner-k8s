# Policy for hermes agent — full CRUD on hermes KV2 path
apiVersion: vault.vault.upbound.io/v1alpha1
kind: Policy
metadata:
  name: hermes-agent
  namespace: crossplane-system
spec:
  deletionPolicy: Delete
  providerConfigRef:
    name: bao-hnatekmar-xyz
  forProvider:
    name: hermes-agent
    policy: |
      path "hermes/data/*" {
        capabilities = ["create", "read", "update", "patch", "delete", "list", "scan"]
      }
      path "hermes/metadata/*" {
        capabilities = ["create", "read", "update", "patch", "delete", "list", "scan"]
      }
