apiVersion: jwt.vault.upbound.io/v1alpha1
kind: AuthBackendRole
metadata:
  name: admin
  namespace: crossplane-system
spec:
  providerConfigRef:
    name: bao-hnatekmar-xyz
  forProvider:
    backendRef:
      name: sso
    userClaim: email
    allowedRedirectUris:
      - https://bao.hnatekmar.xyz/ui/vault/auth/oidc/oidc/callback
      - http://localhost:8250/oidc/callback
    roleName: admin
    roleType: oidc
    groupsClaim: groups
    oidcScopes:
      - "openid"
      - "microprofile-jwt"
    boundClaims:
      groups: "admin"
    tokenPolicies:
      - admin-identity
    tokenTtl: 86400
    tokenMaxTtl: 86400
    tokenType: "service"
