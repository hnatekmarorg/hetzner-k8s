---
# SSO Role for hnatekmarorg base users (using realm role)
# Users with hnatekmarorg-base group get the hnatekmarorg-base realm role
apiVersion: jwt.vault.upbound.io/v1alpha1
kind: AuthBackendRole
metadata:
  name: sso-hnatekmarorg-base
  namespace: crossplane-system
spec:
  providerConfigRef:
    name: bao-hnatekmar-xyz
  forProvider:
    backendRef:
      name: sso
    userClaim: email
    allowedRedirectUris:
      - https://bao.hnatekmar.xyz/ui/vault/auth/oidc/oidc/callback
      - http://localhost:8250/oidc/callback
    roleName: sso-hnatekmarorg-base
    roleType: oidc
    groupsClaim: groups
    boundClaims:
      groups: "hnatekmarorg-base"
    tokenPolicies:
      - hnatekmarorg-base
    # Token TTL limits for user tokens
    tokenTtl: 3600
    tokenMaxTtl: 14400
    tokenType: "service"
