---
# SSO Role for hnatekmarorg users
# Users with hnatekmarorg-base group get the hnatekmarorg policy
apiVersion: jwt.vault.upbound.io/v1alpha1
kind: AuthBackendRole
metadata:
  name: hnatekmarorg
  namespace: crossplane-system
spec:
  providerConfigRef:
    name: bao-hnatekmar-xyz
  forProvider:
    backendRef:
      name: sso
    userClaim: email
    allowedRedirectUris:
      - https://bao.hnatekmar.xyz/ui/vault/auth/oidc/oidc/callback
      - http://localhost:8250/oidc/callback
    roleName: hnatekmarorg
    roleType: oidc
    groupsClaim: groups
    boundClaims:
      groups: "hnatekmarorg-base"
    tokenPolicies:
      - hnatekmarorg
    tokenTtl: 3600
    tokenMaxTtl: 14400
    tokenType: "service"
