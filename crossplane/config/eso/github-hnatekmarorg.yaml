apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-hnatekmarorg
  namespace: crossplane-system
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: local-devops
    kind: ClusterSecretStore
  target:
    name: github-hnatekmarorg
    template:
      type: Opaque
      data:
        clientId: "{{ .clientId }}"
        clientSecret: "{{ .clientSecret }}"
  dataFrom:
    - extract:
        key: github/hnatekmarorg
