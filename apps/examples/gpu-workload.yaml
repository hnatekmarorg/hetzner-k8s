# Example GPU Workload for Testing
# This pod will trigger autoscaling of the GPU node pool

apiVersion: v1
kind: Pod
metadata:
  name: gpu-test-pod
  labels:
    workload-type: ai-ml
    app: gpu-test
spec:
  nodeSelector:
    node-class: gpu

  tolerations:
    - key: nvidia.com/gpu
      operator: Equal
      value: "true"
      effect: NoSchedule

    - key: workload-type
      operator: Equal
      value: ai-ml
      effect: NoSchedule

  containers:
  - name: cuda-vector-add
    image: nvidia/samples:vectoradd-cuda12.2.0
    resources:
      requests:
        nvidia.com/gpu: 1
      limits:
        nvidia.com/gpu: 1

    # environment variables for the CUDA sample
    env:
    - name: NVIDIA_VISIBLE_DEVICES
      value: "0"

  restartPolicy: Never
