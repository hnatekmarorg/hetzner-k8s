# Example ML Training Job with GPU
# Demonstrates a realistic AI/ML workload configuration

apiVersion: batch/v1
kind: Job
metadata:
  name: ml-training-job
  labels:
    workload-type: ai-ml
    app: training
spec:
  template:
    metadata:
      labels:
        workload-type: ai-ml
        app: training
    spec:
      nodeSelector:
        node-class: gpu

      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule

      restartPolicy: OnFailure

      # Init container to download/check model artifacts
      initContainers:
      - name: download-models
        image: ubuntu:22.04
        command: ["sh", "-c", "echo 'Downloading model artifacts...'; sleep 5"]
        volumeMounts:
        - name: data
          mountPath: /data
        - name: shm
          mountPath: /dev/shm

      containers:
      - name: trainer
        # Replace with your actual ML training image
        image: pytorch/pytorch:2.2.0-cuda12.1-cudnn8-runtime

        command:
        - python
        - -c
        - |
          import torch
          print(f"CUDA available: {torch.cuda.is_available()}")
          print(f"CUDA device count: {torch.cuda.device_count()}")
          print(f"CUDA current device: {torch.cuda.current_device()}")
          print(f"CUDA device name: {torch.cuda.get_device_name(0)}")
          print("Training simulation complete!")

        resources:
          requests:
            nvidia.com/gpu: 1
            memory: "16Gi"
            cpu: "4"
          limits:
            nvidia.com/gpu: 1
            memory: "32Gi"
            cpu: "8"

        # Large shared memory size for PyTorch
        volumeMounts:
        - name: shm
          mountPath: /dev/shm

        - name: data
          mountPath: /data

        env:
        - name: CUDA_VISIBLE_DEVICES
          value: "0"

        # Environment variables for ML frameworks
        - name: NVIDIA_VISIBLE_DEVICES
          value: "0"
        - name: NCCL_DEBUG
          value: "INFO"
        - name: TORCH_CUDA_ARCH_LIST
          value: "8.9"  # For L40S

      volumes:
      # Shared memory volume for PyTorch DataLoader
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 8Gi

      # Persistent volume for training data
      - name: data
        emptyDir: {}

      # Node affinity for optimization
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu
                operator: Exists

        # Pod anti-affinity to spread across GPU nodes if multiple pods
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - training
              topologyKey: kubernetes.io/hostname

  backoffLimit: 4
  completions: 1
  parallelism: 1
