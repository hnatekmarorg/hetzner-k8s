apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-cluster
  namespace: argocd
  labels:
    environment: production
    purpose: eks-cluster
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  source:
    # Path to the doks-cluster helm chart
    repoURL: https://github.com/hnatekmar/hetzner-k8s.git
    targetRevision: HEAD
    path: charts/doks-cluster

    # Use production values
    helm:
      valueFiles:
        - values-prod.yaml

      # Override specific values if needed (e.g., for different environments)
      values: |
        cluster:
          name: prod-cluster
          region: nyc1

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true

    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - FailOnSharedResource=true
      - ApplyOutOfSyncOnly=true

    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 10m

  # Health checks
  health:
    # Ensure resources are healthy before marking sync as successful
    resources:
      - kind: Cluster
        apiVersion: kubernetes.digitalocean.crossplane.io/v1alpha1
        name: prod-cluster
        namespace: crossplane-system

      - kind: Release
        apiVersion: helm.crossplane.io/v1beta1
        name: prod-cluster-argocd
        namespace: crossplane-system
