{{- $cluster := .Values.cluster -}}
{{- $clusterName := $cluster.name | default .Release.Name -}}
apiVersion: helm.crossplane.io/v1beta1
kind: ProviderConfig
metadata:
  name: {{ $clusterName }}-helm
  namespace: crossplane-system
spec:
  credentials:
    secretRef:
      key: attribute.kube_config.0.raw_config
      name: {{ $clusterName }}
      namespace: crossplane-system
    source: Secret
