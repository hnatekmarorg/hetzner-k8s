{{- $cluster := .Values.cluster -}}
{{- $clusterName := $cluster.name | default .Release.Name -}}
apiVersion: kubernetes.crossplane.io/v1alpha1
kind: ProviderConfig
metadata:
  name: {{ $clusterName }}-kubernetes
  namespace: crossplane-system
spec:
  credentials:
    secretRef:
      key: attribute.kube_config.0.raw_config
      name: {{ $clusterName }}
      namespace: crossplane-system
    source: Secret
